{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="BEEZap">
    <title>{% block title %}BEEZap{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    {% if messages %}
      <div class="toast-container" aria-live="polite" aria-atomic="true">
        {% for message in messages %}
          <div class="toast-message toast-{{ message.tags|default:'info' }}" role="status" data-toast-message>
            <span class="toast-marker" aria-hidden="true"></span>
            <div class="toast-content">{{ message }}</div>
            <button type="button" class="toast-close" aria-label="Fechar notificação" data-toast-close>×</button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
    <script>
      (function () {
        const toasts = document.querySelectorAll('[data-toast-message]');
        if (!toasts.length) return;
        toasts.forEach((toast) => {
          const closeButton = toast.querySelector('[data-toast-close]');
          const dismiss = () => {
            toast.classList.add('toast-hiding');
            window.setTimeout(() => toast.remove(), 220);
          };
          if (closeButton) {
            closeButton.addEventListener('click', dismiss);
          }
          window.setTimeout(dismiss, 4200);
        });
      }());
    </script>
  </body>
</html>
